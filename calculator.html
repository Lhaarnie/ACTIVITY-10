<!DOCTYPE html>
<html>
<head>
<title>Standard Calculator</title>

<style>

body{
    font-family: Arial;
    background:#dcdcdc;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.calculator{
    background:#e9e9e9;
    padding:15px;
    border:2px solid #888;
    width:220px;
}

#display{
    width:100%;
    height:40px;
    font-size:22px;
    text-align:right;
    margin-bottom:10px;
    padding-right:5px;
}

.grid{
    display:grid;
    grid-template-columns: repeat(4, 1fr);
    gap:5px;
}

button{
    height:40px;
    font-size:16px;
}

.clear{
    margin-top:10px;
    width:100%;
    height:40px;
    font-size:18px;
}

</style>
</head>

<body>

<div class="calculator">

<input type="text" id="display" disabled>

<div class="grid">

<button onclick="press('7')">7</button>
<button onclick="press('8')">8</button>
<button onclick="press('9')">9</button>
<button onclick="press('+')">+</button>

<button onclick="press('4')">4</button>
<button onclick="press('5')">5</button>
<button onclick="press('6')">6</button>
<button onclick="press('-')">-</button>

<button onclick="press('1')">1</button>
<button onclick="press('2')">2</button>
<button onclick="press('3')">3</button>
<button onclick="press('*')">*</button>

<button onclick="aboutDeveloper()">A</button>
<button onclick="press('0')">0</button>
<button onclick="aboutApp()">B</button>
<button onclick="press('/')">/</button>

<button style="grid-column:4;" onclick="calculate()">=</button>

</div>

<button class="clear" onclick="clearDisplay()">Clear</button>

</div>

<script>

function press(value){
document.getElementById("display").value += value;
}

function calculate(){
let result=document.getElementById("display").value;
document.getElementById("display").value=eval(result);
}

function clearDisplay(){
document.getElementById("display").value="";
}

function aboutDeveloper(){
alert("Developer: Lhaarnie Aman\nCourse: MSIT");
}

function aboutApp(){
alert("Application: Standard Calculator\nVersion: 1.0\nCreated using HTML, CSS, and JavaScript.");
}

</script>

</body>
</html>
